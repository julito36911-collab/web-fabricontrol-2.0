<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Background -->
  <rect width="400" height="100" fill="#FFFFFF"/>
  
  <!-- Icon: Factory/Control symbol -->
  <g transform="translate(20, 25)">
    <!-- Factory building -->
    <rect x="0" y="20" width="40" height="30" fill="#5A8AA0" rx="2"/>
    <rect x="5" y="25" width="8" height="8" fill="#FFFFFF" opacity="0.3"/>
    <rect x="14" y="25" width="8" height="8" fill="#FFFFFF" opacity="0.3"/>
    <rect x="23" y="25" width="8" height="8" fill="#FFFFFF" opacity="0.3"/>
    <rect x="5" y="36" width="8" height="8" fill="#FFFFFF" opacity="0.3"/>
    <rect x="14" y="36" width="8" height="8" fill="#FFFFFF" opacity="0.3"/>
    <rect x="23" y="36" width="8" height="8" fill="#FFFFFF" opacity="0.3"/>
    
    <!-- Chimney -->
    <rect x="32" y="10" width="6" height="12" fill="#5A8AA0"/>
    
    <!-- Control dial -->
    <circle cx="20" cy="10" r="8" fill="#F09C85" stroke="#5A8AA0" stroke-width="2"/>
    <line x1="20" y1="10" x2="20" y2="5" stroke="#5A8AA0" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Text: FabriControl -->
  <text x="80" y="45" font-family="'Arial Black', sans-serif" font-size="28" font-weight="900" fill="#5A8AA0">
    Fabri
  </text>
  <text x="165" y="45" font-family="'Arial Black', sans-serif" font-size="28" font-weight="900" fill="#F09C85">
    Control
  </text>
  
  <!-- Tagline -->
  <text x="80" y="65" font-family="Arial, sans-serif" font-size="12" fill="#666666" font-weight="300">
    Gestión Inteligente para tu Taller
  </text>
</svg>
