name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            frontend-react-legacy/**
            node_modules/**
            BUGS_PENDIENTES.md
            NEXT_FOR_CLAUDE_CODE.md
            WORKFLOW_OFICIAL.md
            RESUMEN-CAMBIOS-2026-04-08.md
            CLAUDE.md
            _old_recursos/**
            backend/**
            tests/**
            test_reports/**
            test_result.md
            memory/**
            installer/**
